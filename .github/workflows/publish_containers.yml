---
name: Build & Publish Containers

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Tag de imagen (opcional, formato vN.YYYYmmDD[-N])'
        required: false
        default: ''
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*.*'

jobs:
  check_paths:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] || [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            if echo "$CHANGED" | grep -qE '^backend/'; then
              echo "backend=true" >> "$GITHUB_OUTPUT"
            else
              echo "backend=false" >> "$GITHUB_OUTPUT"
            fi
            if echo "$CHANGED" | grep -qE '^frontend/'; then
              echo "frontend=true" >> "$GITHUB_OUTPUT"
            else
              echo "frontend=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  build-backend:
    needs: check_paths
    if: needs.check_paths.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/java/jchess-parent/pom.xml

      - name: Build backend
        working-directory: backend/java/jchess-parent
        run: chmod +x mvnw && ./mvnw -q -DskipTests clean package

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version_tag }}" ]; then
            IMAGE_TAG="${{ github.event.inputs.version_tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            IMAGE_TAG="${GITHUB_REF_NAME}"
          else
            IMAGE_TAG="latest"
          fi

          if [ "$IMAGE_TAG" != "latest" ] && ! echo "$IMAGE_TAG" | grep -Eq '^v[0-9]+\.[0-9]{8}(-[0-9]+)?$'; then
            echo "Formato de tag invalido: $IMAGE_TAG"
            echo "Formato esperado: vN.YYYYmmDD[-N]"
            exit 1
          fi

          echo "value=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $IMAGE_TAG"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend/java/
          file: backend/java/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/rafex/jchess-backend:${{ steps.tag.outputs.value }}
            ghcr.io/rafex/jchess-backend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/rafex/jchess-backend:${{ github.sha }}
          provenance: false
          sbom: false

  build-frontend:
    needs: check_paths
    if: needs.check_paths.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version_tag }}" ]; then
            IMAGE_TAG="${{ github.event.inputs.version_tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            IMAGE_TAG="${GITHUB_REF_NAME}"
          else
            IMAGE_TAG="latest"
          fi

          if [ "$IMAGE_TAG" != "latest" ] && ! echo "$IMAGE_TAG" | grep -Eq '^v[0-9]+\.[0-9]{8}(-[0-9]+)?$'; then
            echo "Formato de tag invalido: $IMAGE_TAG"
            echo "Formato esperado: vN.YYYYmmDD[-N]"
            exit 1
          fi

          echo "value=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $IMAGE_TAG"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend/
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/rafex/jchess-frontend:${{ steps.tag.outputs.value }}
            ghcr.io/rafex/jchess-frontend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/rafex/jchess-frontend:${{ github.sha }}
          provenance: false
          sbom: false
